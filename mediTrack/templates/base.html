<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MediTrack{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JavaScript Bundle (for dropdowns, toggles) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                {% load static %}
                <img src="{% static 'images/logo.jpg' %}" alt="Logo" width="30" height="24" style="border-radius : 15px" class="d-inline-block align-text-top">
                MediTrack
              </a>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{% url 'home'%}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'bmi_bmr_calculator'%}">Health Monitor</a>
              </li>
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Appointments
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="{% url 'book_appointment'%}">Book appointments</a></li>
                  <li><a class="dropdown-item" href="{% url 'my_appointments' %}">My appointments</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link" aria-disabled="true">Skin Diagnosis</a>
              </li>
            </ul>
            {% if user.is_authenticated %}
            <!-- Show the logout button if the user is logged in -->
            <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Logout</button>
            </form>
            {% else %}
            <!-- Show login link or other content if the user is not logged in -->
            <a class="btn btn-primary ms-2" href="{% url 'login' %}">Login</a>
            <a class="btn btn-outline-light ms-2" href="{% url 'signup' %}">Register</a>

            {% endif %}

          </div>
        </div>
      </nav>       


    <!-- Content Block -->
    <div>
        {% block content %}{% endblock %}
    </div>


    <!-- Footer -->
    <footer style="position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; text-align: center; background-color: #333; color: white; padding: 5px 0; font-size: 0.9rem;">
      <p>&copy; 2025 MediTrack. All rights reserved.</p>
  </footer>
      

</body>
</html>
